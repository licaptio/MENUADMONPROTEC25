<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#b30000">

  <title>PROVSOFT POSPDD26</title>

  <link rel="stylesheet" href="./css/variables.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/carrito.css">
  <link rel="stylesheet" href="./css/modales.css">
  <link rel="stylesheet" href="./css/ticket.css">
  <link rel="stylesheet" href="./css/pos.css">
  <link rel="stylesheet" href="./css/corte.css">
</head>

<body>

  <div id="loginScreen"></div>

  <div id="posApp" style="display:none;">
    <header class="header-pos">
      <div class="header-info">
        <div class="header-titulo">PROVSOFT POS 2026</div>

        <div class="header-detalle">
          <span id="headerUsuario">USUARIO</span>
          <span>|</span>
          <span id="headerSucursal">SUCURSAL</span>
          <span>|</span>
          <span id="headerCaja">CAJA 01</span>
          <span>|</span>
          <span id="headerEstado" class="estado-online">ONLINE ●</span>
        </div>
      </div>

      <button id="btnMenuConfig" class="btn-engranaje" type="button" title="Configuración">⚙️</button>
    </header>

    <aside id="panelConfig" class="panel-config oculto">
      <div class="panel-config-titulo">CONFIGURACIÓN</div>

      <button type="button" data-accion="corte">Corte de Caja</button>
      <button type="button" data-accion="reimpresion">Reimpresión</button>
      <button type="button" data-accion="historial">Historial de Ventas</button>
      <button type="button" data-accion="pendientes">Ventas Pendientes</button>
      <button type="button" data-accion="sincronizar">Sincronización</button>

      <hr>

      <button type="button" data-accion="impresoras">Impresoras</button>
      <button type="button" data-accion="rawbt">RawBT</button>
      <button type="button" data-accion="ticket">Configuración Ticket</button>
      <button type="button" data-accion="empresa">Configuración Empresa</button>

      <hr>

      <button type="button" data-accion="usuarios">Usuarios</button>
      <button type="button" data-accion="permisos">Permisos</button>

      <hr>

      <button type="button" data-accion="acerca">Acerca de</button>
      <button type="button" data-accion="salir">Cerrar Sesión</button>
    </aside>

    <main id="areaOperacion" class="area-operacion">
      <!-- Aquí debe ir/renderizarse el POS actual: buscador, carrito, totales y cobro -->
    </main>
  </div>

  <div id="modalCobro" class="modal"></div>

  <div id="modalCantidad" class="modal"></div>

  <div id="ticketArea"></div>

  <script type="module" src="./js/ui/menuConfig.js"></script>
  <script type="module" src="./js/app.js"></script>

</body>
</html>
